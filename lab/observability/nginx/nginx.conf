user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  65;
  server_tokens off;

  # Docker embedded DNS
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Shared proxy settings
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;
  proxy_read_timeout 600s;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # -------------------------------------------------------------------------
  # Internal Loki gateway (Compose network only — Alloy + Grafana datasources)
  # No basic auth; tenant comes from client X-Scope-OrgID / Alloy tenant_id.
  # -------------------------------------------------------------------------
  server {
    listen 3100;
    server_name _;

    location = / {
      return 200 'OK';
      add_header Content-Type text/plain;
    }

    location = /api/prom/push {
      set $write_upstream http://write:3100;
      proxy_pass $write_upstream$request_uri;
    }

    location = /api/prom/tail {
      set $read_upstream http://read:3100;
      proxy_pass $read_upstream$request_uri;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location ~ /api/prom/.* {
      set $read_upstream http://read:3100;
      proxy_pass $read_upstream$request_uri;
    }

    location = /loki/api/v1/push {
      set $write_upstream http://write:3100;
      proxy_pass $write_upstream$request_uri;
    }

    location = /loki/api/v1/tail {
      set $read_upstream http://read:3100;
      proxy_pass $read_upstream$request_uri;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location ~ /loki/api/.* {
      set $read_upstream http://read:3100;
      proxy_pass $read_upstream$request_uri;
    }
  }

  # -------------------------------------------------------------------------
  # HTTP → HTTPS redirect (published host :80)
  # -------------------------------------------------------------------------
  server {
    listen 80 default_server;
    server_name grafana.marsey.tel loki.marsey.tel prometheus.marsey.tel;
    return 301 https://$host$request_uri;
  }

  # -------------------------------------------------------------------------
  # Grafana (TLS + Grafana login; no nginx basic auth)
  # -------------------------------------------------------------------------
  server {
    listen 443 ssl;
    http2 on;
    server_name grafana.marsey.tel;

    ssl_certificate     /etc/nginx/tls/cert.pem;
    ssl_certificate_key /etc/nginx/tls/cert-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff always;

    location / {
      set $grafana_upstream http://grafana:3000;
      proxy_pass $grafana_upstream;
    }
  }

  # -------------------------------------------------------------------------
  # Loki API (TLS + basic auth; default tenant marsey)
  # -------------------------------------------------------------------------
  server {
    listen 443 ssl;
    http2 on;
    server_name loki.marsey.tel;

    ssl_certificate     /etc/nginx/tls/cert.pem;
    ssl_certificate_key /etc/nginx/tls/cert-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    auth_basic           "Loki";
    auth_basic_user_file /etc/nginx/htpasswd;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff always;

    # Default tenant if client omits the header
    proxy_set_header X-Scope-OrgID marsey;

    location = / {
      return 200 'OK';
      add_header Content-Type text/plain;
    }

    location = /api/prom/push {
      set $write_upstream http://write:3100;
      proxy_pass $write_upstream$request_uri;
    }

    location = /api/prom/tail {
      set $read_upstream http://read:3100;
      proxy_pass $read_upstream$request_uri;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location ~ /api/prom/.* {
      set $read_upstream http://read:3100;
      proxy_pass $read_upstream$request_uri;
    }

    location = /loki/api/v1/push {
      set $write_upstream http://write:3100;
      proxy_pass $write_upstream$request_uri;
    }

    location = /loki/api/v1/tail {
      set $read_upstream http://read:3100;
      proxy_pass $read_upstream$request_uri;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location ~ /loki/api/.* {
      set $read_upstream http://read:3100;
      proxy_pass $read_upstream$request_uri;
    }
  }

  # -------------------------------------------------------------------------
  # Prometheus (TLS + basic auth)
  # -------------------------------------------------------------------------
  server {
    listen 443 ssl;
    http2 on;
    server_name prometheus.marsey.tel;

    ssl_certificate     /etc/nginx/tls/cert.pem;
    ssl_certificate_key /etc/nginx/tls/cert-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    auth_basic           "Prometheus";
    auth_basic_user_file /etc/nginx/htpasswd;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff always;

    location / {
      set $prom_upstream http://prometheus:9090;
      proxy_pass $prom_upstream;
    }
  }
}
