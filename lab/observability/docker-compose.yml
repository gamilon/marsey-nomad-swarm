# Lab observability: Loki + Grafana + Prometheus + Alloy
# Project name avoids colliding with other Compose stacks on the host.
name: marsey-observability

networks:
  observability:

volumes:
  prometheus-data:
  grafana-data:
  alloy-data:

services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: public
      MINIO_UPDATE: "off"
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /data/loki-data /data/loki-ruler
        minio server /data
    volumes:
      - ./.data/minio:/data
    networks:
      - observability
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  read:
    image: grafana/loki:3.7.3
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/config.yaml
      - -config.expand-env=true
      - -target=read
      - -query-scheduler.use-scheduler-ring=false
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml:ro
    depends_on:
      minio:
        condition: service_healthy
    networks:
      observability:
        aliases:
          - loki
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  write:
    image: grafana/loki:3.7.3
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/config.yaml
      - -config.expand-env=true
      - -target=write
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml:ro
    depends_on:
      minio:
        condition: service_healthy
    networks:
      observability:
        aliases:
          - loki
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  backend:
    image: grafana/loki:3.7.3
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/config.yaml
      - -config.expand-env=true
      - -target=backend
      - -legacy-read-mode=false
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml:ro
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - observability
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  gateway:
    image: nginx:1.27.4
    restart: unless-stopped
    depends_on:
      read:
        condition: service_healthy
      write:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
      - ./tls:/etc/nginx/tls:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - observability
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3100/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  alloy:
    image: grafana/alloy:v1.17.1
    restart: unless-stopped
    # Journal + alloc log access on the Nomad host
    user: root
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
      - /opt/nomad/data/alloc:/opt/nomad/data/alloc:ro
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - observability
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:12345/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  prometheus:
    image: prom/prometheus:v3.2.1
    restart: unless-stopped
    user: root
    entrypoint:
      - /bin/sh
      - -euc
      - |
        if [ -z "$${NOMAD_TOKEN}" ]; then
          echo "WARN: NOMAD_TOKEN empty — Nomad scrape will fail until set in observability.env" >&2
          echo "invalid" > /etc/prometheus/nomad_token
        else
          printf '%s' "$${NOMAD_TOKEN}" > /etc/prometheus/nomad_token
        fi
        chmod 600 /etc/prometheus/nomad_token
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=15d \
          --web.enable-lifecycle \
          --web.console.libraries=/usr/share/prometheus/console_libraries \
          --web.console.templates=/usr/share/prometheus/consoles
    environment:
      NOMAD_TOKEN: ${NOMAD_TOKEN:-}
    extra_hosts:
      - "nomad.marsey.tel:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./tls/ca.pem:/etc/prometheus/certs/ca.pem:ro
      - prometheus-data:/prometheus
    networks:
      - observability
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  grafana:
    image: grafana/grafana:11.6.3
    restart: unless-stopped
    environment:
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_BASIC_ENABLED: "true"
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.marsey.tel
      GF_SERVER_DOMAIN: grafana.marsey.tel
      GF_SERVER_PROTOCOL: http
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
